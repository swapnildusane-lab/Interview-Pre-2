<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Java Full Stack Interview Prep — 6.5 Years Level</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #222535;
    --bg4: #2a2d3e;
    --border: #2e3248;
    --border2: #3d4165;
    --text: #e8eaf6;
    --text2: #9ca3c4;
    --text3: #6b7499;
    --accent: #6c63ff;
    --accent2: #8b83ff;
    --green: #00c896;
    --green-bg: #0d2e24;
    --amber: #f5a623;
    --amber-bg: #2e2310;
    --red: #ff6b6b;
    --red-bg: #2e1414;
    --blue: #4da6ff;
    --blue-bg: #0d1e35;
    --teal: #00d4b4;
    --teal-bg: #0d2a27;
    --pink: #ff7eb3;
    --radius: 10px;
    --radius-sm: 6px;
    --mono: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    --sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--teal));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff;
  }
  .logo-text h1 { font-size: 17px; font-weight: 700; color: var(--text); }
  .logo-text p { font-size: 12px; color: var(--text3); }
  .header-stats {
    display: flex; gap: 1rem; margin-left: auto; flex-wrap: wrap;
  }
  .h-stat {
    text-align: center;
    padding: 6px 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .h-stat-num { font-size: 18px; font-weight: 700; color: var(--accent2); }
  .h-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }

  .search-wrap {
    flex: 1; min-width: 200px; max-width: 320px;
  }
  .search-input {
    width: 100%; padding: 8px 14px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text); font-size: 13px;
    outline: none; transition: border .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  /* ── LAYOUT ── */
  .layout {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 0;
    min-height: calc(100vh - 80px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 80px;
    height: calc(100vh - 80px);
    overflow-y: auto;
  }
  .sidebar-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    color: var(--text3); text-transform: uppercase;
    padding: 0 1.25rem; margin-bottom: 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 1.25rem;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .15s;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    background: var(--bg3);
    border-left-color: var(--accent);
    color: var(--accent2);
  }
  .nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
  .nav-text { font-size: 13px; font-weight: 500; flex: 1; color: inherit; }
  .nav-count {
    font-size: 11px; padding: 2px 7px;
    background: var(--bg4); border-radius: 10px; color: var(--text3);
  }
  .nav-item.active .nav-count { background: var(--accent); color: #fff; }

  .progress-mini {
    margin: 0 1.25rem 1.5rem;
    background: var(--bg3);
    border-radius: 3px; height: 3px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .3s; }

  .mastered-panel {
    margin: 1rem 1.25rem;
    padding: .75rem;
    background: var(--green-bg);
    border: 1px solid rgba(0,200,150,.2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--green);
    text-align: center;
  }
  .mastered-panel strong { font-size: 22px; display: block; }

  /* ── MAIN ── */
  .main {
    padding: 1.5rem 2rem;
    overflow-y: auto;
  }

  .topic-header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .topic-header h2 { font-size: 22px; font-weight: 700; color: var(--text); }
  .topic-header p { font-size: 13px; color: var(--text3); margin-top: 4px; }
  .topic-pills { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .pill {
    font-size: 11px; padding: 3px 10px;
    border-radius: 12px; font-weight: 500;
    border: 1px solid transparent;
  }
  .pill-easy { background: var(--green-bg); color: var(--green); border-color: rgba(0,200,150,.3); }
  .pill-med  { background: var(--amber-bg); color: var(--amber); border-color: rgba(245,166,35,.3); }
  .pill-hard { background: var(--red-bg);   color: var(--red);   border-color: rgba(255,107,107,.3); }
  .pill-info { background: var(--blue-bg);  color: var(--blue);  border-color: rgba(77,166,255,.3); }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card:hover { border-color: var(--border2); }
  .q-card.open { border-color: var(--accent); }

  .q-head {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 1rem 1.25rem; cursor: pointer;
    user-select: none;
  }
  .q-badge {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .badge-easy { background: var(--green-bg); color: var(--green); }
  .badge-med  { background: var(--amber-bg); color: var(--amber); }
  .badge-hard { background: var(--red-bg);   color: var(--red); }

  .q-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4; }
  .q-meta  { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
  .q-tag   { font-size: 10px; padding: 2px 7px; border-radius: 8px; font-weight: 500; }
  .t-java   { background: #2a1a0d; color: #f5a623; }
  .t-spring { background: #0d2212; color: #00c896; }
  .t-micro  { background: #0d1e35; color: #4da6ff; }
  .t-db     { background: #1c0d2e; color: #b07aff; }
  .t-finance{ background: #2e1a0d; color: #ff8c42; }
  .t-angular{ background: #1a0d2e; color: #ff7eb3; }

  .q-chevron {
    color: var(--text3); font-size: 12px; flex-shrink: 0;
    margin-top: 6px; transition: transform .2s;
  }
  .q-card.open .q-chevron { transform: rotate(90deg); color: var(--accent2); }
  .mastered-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: var(--green-bg); color: var(--green); flex-shrink: 0;
    display: none; margin-top: 4px;
  }
  .q-card.mastered .mastered-badge { display: inline-block; }

  .q-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 1.25rem;
  }
  .q-card.open .q-body { display: block; }

  .section-lbl {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text3); margin: 1rem 0 .5rem;
  }
  .section-lbl:first-child { margin-top: 0; }

  .answer-text { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .answer-text strong { color: var(--accent2); font-weight: 600; }

  .code-block {
    background: #0a0c14;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    font-family: var(--mono);
    font-size: 12.5px;
    color: #c9d1d9;
    line-height: 1.65;
    overflow-x: auto;
    white-space: pre;
    position: relative;
    margin: .75rem 0;
  }
  .code-block .cmt { color: #6b7499; }
  .code-block .kw  { color: #79b8ff; }
  .code-block .str { color: #9ecbff; }
  .code-block .ann { color: #e3b341; }
  .code-block .cls { color: #b392f0; }
  .code-block .num { color: #f97583; }

  .tip-box {
    background: var(--blue-bg);
    border-left: 3px solid var(--blue);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: .75rem 1rem; margin: .75rem 0;
    font-size: 13px; color: var(--text2);
  }
  .tip-box strong { color: var(--blue); }

  .scenario-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: .75rem 1rem; margin: .75rem 0;
    font-size: 13px; color: var(--text2);
  }
  .scenario-box .slbl {
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--teal); margin-bottom: 5px;
  }

  .q-actions { display: flex; gap: 8px; margin-top: 1rem; flex-wrap: wrap; }
  .btn {
    font-size: 12px; padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: 20px; background: transparent; cursor: pointer;
    color: var(--text2); transition: all .15s; font-family: var(--sans);
  }
  .btn:hover { background: var(--bg3); color: var(--text); }
  .btn-master { }
  .btn-master.on { background: var(--green-bg); color: var(--green); border-color: rgba(0,200,150,.4); }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 12px; padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 16px; background: var(--bg3); cursor: pointer;
    color: var(--text2); transition: all .15s; font-family: var(--sans);
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 1rem 0; }
    .main { padding: 1rem; }
    .header-inner { gap: 1rem; }
    .header-stats { gap: .5rem; }
    .h-stat-num { font-size: 15px; }
  }

  /* ── EMPTY STATE ── */
  .empty { text-align: center; padding: 3rem; color: var(--text3); }
  .empty-icon { font-size: 48px; margin-bottom: 1rem; }

  /* Highlight search match */
  mark { background: rgba(108,99,255,.35); color: var(--accent2); border-radius: 2px; padding: 0 2px; }
</style>
</head>

<script>
const DATA = [
  {
    id:'core-java', icon:'☕', name:'Core Java', desc:'Deep Java fundamentals — OOP, memory, threads, collections',
    questions:[
      { level:'med', text:'What is the difference between throw vs throws? (Q70)',
        tags:['t-java'],
        answer:'<strong>throw</strong> is used to explicitly throw an exception inside a method body. <strong>throws</strong> is used in the method signature to declare that the method might throw checked exceptions. Unchecked exceptions (RuntimeException subclasses) don\'t need throws declaration.',
        code:`// throw — actual exception creation
public void validateCibilScore(int score) {
    if (score < 300 || score > 900) {
        throw new IllegalArgumentException(
            "Invalid CIBIL score: " + score
        );
    }
}

// throws — declaration in method signature
public CibilReport fetchReport(String pan)
        throws IOException, CibilServiceException {
    return restClient.get("/cibil/" + pan);
}`,
        tip:'In interviews: "throw creates and fires the exception; throws tells the compiler and caller what to expect. Unchecked exceptions (RuntimeException subclasses) don\'t need throws declaration."',
        scenario:'In your CIBIL project: fetchReport() throws IOException (checked), but validateCibilScore() uses throw for business rule violations (unchecked).' },

      { level:'hard', text:'What causes ConcurrentModificationException? (Q54)',
        tags:['t-java'],
        answer:'Thrown when a collection is structurally modified while iterating over it using an iterator. The fail-fast mechanism detects the <strong>modCount mismatch</strong> inside ArrayList/HashMap.',
        code:`// BAD — throws ConcurrentModificationException
List<String> disputes = new ArrayList<>(List.of("D1","D2","D3"));
for (String d : disputes) {
    if (d.equals("D2")) disputes.remove(d); // modifies during iteration!
}

// FIX 1 — use Iterator.remove()
Iterator<String> it = disputes.iterator();
while (it.hasNext()) {
    if (it.next().equals("D2")) it.remove(); // safe
}

// FIX 2 — removeIf (Java 8, cleanest)
disputes.removeIf(d -> d.equals("D2"));

// FIX 3 — CopyOnWriteArrayList for concurrent
List<String> safe = new CopyOnWriteArrayList<>(disputes);`,
        tip:'Production scenario: In your dispute portal, if multiple threads read the dispute list while one thread resolves disputes, use CopyOnWriteArrayList or ConcurrentHashMap.',
        scenario:'Alert system bug: iterating over user subscriptions while new subscriptions arrive — switched to CopyOnWriteArrayList, issue resolved.' },

      { level:'hard', text:'Fail-fast vs Fail-safe iterators (Q52)',
        tags:['t-java'],
        answer:'<strong>Fail-fast</strong> iterators immediately throw ConcurrentModificationException if the collection changes during iteration (ArrayList, HashMap). <strong>Fail-safe</strong> iterators work on a copy of the collection — structural changes don\'t affect iteration (CopyOnWriteArrayList, ConcurrentHashMap).',
        code:`// Fail-fast: ArrayList, HashMap
HashMap<String, Double> creditScores = new HashMap<>();
// Throws ConcurrentModificationException if modified mid-iteration

// Fail-safe: ConcurrentHashMap
ConcurrentHashMap<String, Double> scores = new ConcurrentHashMap<>();
for (Map.Entry<String, Double> e : scores.entrySet()) {
    System.out.println(e.getKey() + " -> " + e.getValue()); // safe
}`,
        tip:'"Fail-fast = throws immediately on structural change. Fail-safe = works on copy, never throws but may not see latest data."',
        scenario:'CIBIL alert system: iterating user subscriptions while new ones arrive — use ConcurrentHashMap (fail-safe).' },

      { level:'med', text:'final vs finally vs finalize — differences',
        tags:['t-java'],
        answer:'<strong>final</strong>: keyword — variable unmodifiable, method non-overridable, class non-extendable. <strong>finally</strong>: block that always executes after try-catch, used for cleanup. <strong>finalize()</strong>: deprecated method called by GC before object destruction.',
        code:`final double CIBIL_MAX = 900.0; // can't reassign

public final String maskPan(String pan) {
    return pan.substring(0,4) + "XXXXXX";
}

Connection conn = null;
try {
    conn = getConnection();
    return conn.executeQuery(sql);
} catch (SQLException e) {
    throw new CibilFetchException(e);
} finally {
    if (conn != null) conn.close(); // ALWAYS runs!
}`,
        tip:'"finalize() was removed/deprecated in Java 9+. Use try-with-resources instead. finally block executes even if return is called inside try."' },

      { level:'med', text:'Abstract class vs Interface — diff and use cases (Q28)',
        tags:['t-java'],
        answer:'<strong>Abstract class</strong>: can have state (fields), constructors, concrete methods. Single inheritance. <strong>Interface</strong>: pure contract. Java 8+: default/static methods. Java 9+: private methods. A class can implement multiple interfaces.',
        code:`// Abstract class — shared state for credit products
public abstract class CreditProduct {
    protected String productId;
    protected double interestRate;
    public abstract double calculateEmi(double principal, int months);
    public String getProductId() { return productId; }
}

// Interface — capability contract
public interface Reportable {
    byte[] generatePdf();
    default String getMimeType() { return "application/pdf"; }
}

// Marker interface (Q73) — no methods, just tagging
public interface Auditable { }

class HomeLoan extends CreditProduct implements Reportable, Auditable {
    public double calculateEmi(double p, int m) { return 0; }
    public byte[] generatePdf() { return new byte[0]; }
}`,
        tip:'Use abstract class when classes share state/behavior. Use interface for capabilities (Reportable, Auditable) that any class can have.',
        scenario:'CreditProduct is abstract (all products share interestRate). Reportable is interface — both Dispute and CibilReport can generate PDFs.' },

      { level:'easy', text:'States of a Thread (Q38)',
        tags:['t-java'],
        answer:'A Java thread has 6 states: <strong>NEW</strong> → <strong>RUNNABLE</strong> → <strong>BLOCKED / WAITING / TIMED_WAITING</strong> → <strong>TERMINATED</strong>.',
        code:`Thread t = new Thread(() -> {
    try { Thread.sleep(1000); } // → TIMED_WAITING
    catch (InterruptedException e) { }
    synchronized(lock) { }      // → BLOCKED if lock held
});
// t.getState() == NEW
t.start(); // → RUNNABLE
// After run() → TERMINATED`,
        scenario:'Dispute portal async processing: threads processing dispute resolution can be in WAITING state while waiting for external CIBIL API response — use thread pools.' },

      { level:'med', text:'ExecutorService types (Q39, Q46)',
        tags:['t-java'],
        answer:'ExecutorService manages a pool of threads. Types: Fixed, Cached, Scheduled, Single, ForkJoinPool.',
        code:`ExecutorService fixed   = Executors.newFixedThreadPool(10);
// 10 threads — for CIBIL report fetching

ExecutorService cached  = Executors.newCachedThreadPool();
// grows/shrinks — for burst alert notifications

ExecutorService sched   = Executors.newScheduledThreadPool(2);
// for periodic CIBIL score refresh jobs

ForkJoinPool forkJoin   = new ForkJoinPool();
// for parallel streams

List<Future<Boolean>> futures = new ArrayList<>();
for (Dispute d : disputes) {
    futures.add(fixed.submit(() -> processDispute(d)));
}
fixed.shutdown();`,
        tip:'"Always use custom ThreadPoolExecutor with bounded queues in production — Executors.newFixedThreadPool has unbounded queue, can cause OutOfMemoryError under load."' },

      { level:'med', text:'equals() vs == operator (Q34)',
        tags:['t-java'],
        answer:'<strong>==</strong> compares references (memory address for objects). <strong>equals()</strong> compares logical content. Always override equals() + hashCode() together.',
        code:`String pan1 = new String("ABCDE1234F");
String pan2 = new String("ABCDE1234F");
pan1 == pan2       // false — different heap objects
pan1.equals(pan2)  // true — same content

// Entity — override both
@Entity
public class CibilUser {
    @Override
    public boolean equals(Object o) {
        if (!(o instanceof CibilUser)) return false;
        return Objects.equals(id, ((CibilUser) o).id);
    }
    @Override
    public int hashCode() { return Objects.hash(id); }
}`,
        tip:'"Hibernate requirement: override equals() → MUST override hashCode() or entities break in HashSet/HashMap used internally by JPA dirty checking."' },

      { level:'hard', text:'HashMap Internal Working — hashCode, buckets, treeification (Q43)',
        tags:['t-java'],
        answer:'<strong>HashMap</strong> uses array of linked lists (buckets). hashCode() → index → check equals(). Java 8+: if bucket has >8 entries, converts to red-black tree (O(log n) instead of O(n)).',
        code:`// put("ABCDE1234F", 750)
// hashCode("ABCDE1234F") = 982374
// index = 982374 & (16-1) = 6
// store at bucket[6]

// Collision — two keys hash to same bucket
// bucket[6] → [("ABCDE1234F", 750)] → [("XYZPQ9876G", 680)]

// Java 8 treeification at >8 entries

// HashMap vs ConcurrentHashMap (Q43)
HashMap<String, Integer> map = new HashMap<>();  // not thread-safe
ConcurrentHashMap<String, Integer> chm = new ConcurrentHashMap<>();
chm.putIfAbsent("pan1", 750); // atomic operation

// HashMap allows one null key
// ConcurrentHashMap throws NPE on null key/value`,
        tip:'"HashMap initial capacity 16, load factor 0.75 — resizes at 12 entries. Each resize doubles capacity and rehashes all entries."' },

      { level:'hard', text:'Garbage Collection and Memory Management (Q31)',
        tags:['t-java'],
        answer:'JVM automatically reclaims unreferenced objects. Memory: Eden → Survivor (Young Gen) → Old Gen → Metaspace. Algorithms: G1GC (default Java 9+), ZGC, Shenandoah.',
        code:`// Memory leak — static cache grows forever
public class ReportCache {
    private static Map<String, CibilReport> cache = new HashMap<>();
    // BUG: never cleared!

    // FIX: WeakHashMap or Caffeine with TTL
    private static Map<String, CibilReport> safe = new WeakHashMap<>();
}

// JVM flags
// -Xms512m -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=200
// -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heap.hprof`,
        tip:'"Most common production memory issue: static collections growing unbounded. Monitor with JVisualVM or Prometheus JVM metrics."' }
    ]

        answer:'HTTP Interceptors add auth headers and handle errors globally. JWT stored in memory (not localStorage — XSS risk). httpOnly cookie for refresh token.',
        code:`@Injectable()
export class AuthInterceptor implements HttpInterceptor {
    intercept(req: HttpRequest<any>, next: HttpHandler): Observable<HttpEvent<any>> {
        const token = this.authService.getToken(); // from memory, not localStorage!

        const authReq = token ? req.clone({
            headers: req.headers.set('Authorization', \`Bearer \${token}\`)
        }) : req;

        return next.handle(authReq).pipe(
            catchError(error => {
                if (error.status === 401) {
                    this.authService.logout();
                    this.router.navigate(['/login']);
                }
                if (error.status === 403) {
                    this.router.navigate(['/forbidden']);
                }
                return throwError(() => error);
            })
        );
    }
}`,

let masteredSet = new Set();
let currentTopicId = 'core-java';
let filterLevel = 'all';
let searchText = '';

function render() {
  renderSidebar();
  renderMain();
  updateStats();

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  const total = masteredSet.size;
  const allQ = DATA.reduce((a,t)=>a+t.questions.length,0);
  const pct = Math.round(total/allQ*100);

  sb.innerHTML = `

      <strong>${total}</strong>of ${allQ} mastered
    </div>
    <div class="progress-mini"><div class="progress-fill" style="width:${pct}%"></div></div>

      const mastCount = t.questions.filter((_,i)=>masteredSet.has(t.id+'-'+i)).length;
      return `<div class="nav-item${t.id===currentTopicId?' active':''}" onclick="setTopic('${t.id}')">

        <span class="nav-text">${t.name}</span>
        <span class="nav-count">${mastCount}/${t.questions.length}</span>

}

    qs = qs.filter(q=>q.text.toLowerCase().includes(s)||(q.answer||'').toLowerCase().includes(s));

  const counts = { easy:0, med:0, hard:0 };
  topic.questions.forEach(q=>counts[q.level]++);

  document.getElementById('main').innerHTML = `

      <h2>${topic.icon} ${topic.name}</h2>
      <p>${topic.desc}</p>
      <div class="topic-pills">
        <span class="pill pill-easy">Easy: ${counts.easy}</span>
        <span class="pill pill-med">Medium: ${counts.med}</span>
        <span class="pill pill-hard">Hard: ${counts.hard}</span>
        <span class="pill pill-info">${topic.questions.length} total</span>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn${filterLevel==='all'?' active':''}" onclick="setFilter('all')">All levels</button>
      <button class="filter-btn${filterLevel==='easy'?' active':''}" onclick="setFilter('easy')">Easy</button>
      <button class="filter-btn${filterLevel==='med'?' active':''}" onclick="setFilter('med')">Medium</button>
      <button class="filter-btn${filterLevel==='hard'?' active':''}" onclick="setFilter('hard')">Hard</button>
    </div>

    ${qs.length===0?'<div class="empty"><div class="empty-icon">🔍</div><p>No questions match your filter.</p></div>':''}

    ${qs.map((q,i)=>{
      const realIdx = topic.questions.indexOf(q);
      const id = topic.id+'-'+realIdx;
      const isMastered = masteredSet.has(id);
      const isOpen = false;
      const levelLabel = {easy:'E',med:'M',hard:'H'}[q.level];

      return `
      <div class="q-card${isMastered?' mastered':''}" id="card-${id}">
        <div class="q-head" onclick="toggleQ('${id}')">
          <div class="q-badge badge-${q.level}">${levelLabel}</div>
          <div style="flex:1">
            <div class="q-title">${highlight(q.text)}</div>
            <div class="q-meta">
              ${q.tags.map(t=>`<span class="q-tag ${t}">${t.replace('t-','')}</span>`).join('')}
              <span class="mastered-badge">✓ Mastered</span>
            </div>
          </div>
          <div class="q-chevron" id="chev-${id}">▶</div>
        </div>
        <div class="q-body" id="body-${id}">
          <div class="section-lbl">Answer</div>
          <div class="answer-text">${q.answer||''}</div>

          ${q.code?`
          <div class="section-lbl">Code example</div>
          <div class="code-block">${escHtml(q.code)}</div>
          `:''}

          ${q.tip?`
          <div class="tip-box"><strong>Interview tip:</strong> ${q.tip}</div>
          `:''}

          ${q.scenario?`
          <div class="scenario-box">
            <div class="slbl">Your project scenario</div>
            ${q.scenario}
          </div>
          `:''}

          <div class="q-actions">
            <button class="btn btn-master${isMastered?' on':''}" id="mbtn-${id}"
              onclick="toggleMaster('${id}',event)">
              ${isMastered?'✓ Mastered':'Mark as mastered'}
            </button>
            <button class="btn" onclick="copyCode('${id}',event)">Copy code</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  `;
}

function highlight(text) {
  if (!searchText.trim()) return text;
  const re = new RegExp('(' + searchText.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleQ(id) {
  const card = document.getElementById('card-'+id);
  const body = document.getElementById('body-'+id);
  const chev = document.getElementById('chev-'+id);
  const isOpen = card.classList.contains('open');
  card.classList.toggle('open', !isOpen);
  body.style.display = isOpen ? 'none' : 'block';
  chev.style.transform = isOpen ? '' : 'rotate(90deg)';
  chev.style.color = isOpen ? '' : 'var(--accent2)';
}

function toggleMaster(id, e) {
  e.stopPropagation();
  const card = document.getElementById('card-'+id);
  const btn = document.getElementById('mbtn-'+id);
  if (masteredSet.has(id)) {
    masteredSet.delete(id);
    card.classList.remove('mastered');
    btn.classList.remove('on');
    btn.textContent = 'Mark as mastered';
  } else {
    masteredSet.add(id);
    card.classList.add('mastered');
    btn.classList.add('on');
    btn.textContent = '✓ Mastered';
  }
  updateStats();
  renderSidebar();
}

function copyCode(id, e) {
  e.stopPropagation();
  const topic = DATA.find(t=>t.id===currentTopicId);
  const qIdx = parseInt(id.split('-').pop());
  const q = topic.questions[qIdx];
  if (q && q.code) {
    navigator.clipboard.writeText(q.code).then(()=>{
      const btn = e.target;
      btn.textContent = '✓ Copied!';
      setTimeout(()=>btn.textContent='Copy code',1500);
    });
  }
}

function setTopic(id) {
  currentTopicId = id;
  filterLevel = 'all';
  renderSidebar();
  renderMain();
}

function setFilter(level) {
  filterLevel = level;
  renderMain();
}

function onSearch(val) {
  searchText = val;
  if (val.trim()) {
    // Search across all topics
    let found = false;
    for (const t of DATA) {
      const hasMatch = t.questions.some(q=>
        q.text.toLowerCase().includes(val.toLowerCase())
      );
      if (hasMatch && !found) { currentTopicId = t.id; found = true; }
    }
  }
  renderSidebar();
  renderMain();
}

function updateStats() {
  document.getElementById('st-total').textContent =
    DATA.reduce((a,t)=>a+t.questions.length,0);
  document.getElementById('st-mastered').textContent = masteredSet.size;
}

render();
</script>
</body>
</html>
